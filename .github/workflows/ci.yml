name: ci

# Runs the guards' test suites on every push and PR. The credential guard
# (security/credential-guard.py) is a security control whose whole history is
# bypasses found one incident too late; the adversarial suite exists so the
# next bypass is caught by a red CI run instead of a fifth postmortem
# (claude-ops decisions/ADR-003 Phase 1). Stdlib-only tests — no dependencies
# to install, so this stays a fast, boring gate.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax-check the guard hooks
        run: |
          python -m py_compile security/credential-guard.py
          python -m py_compile scripts/redline-guard.py

      - name: Run the adversarial guard test suite
        run: python -m unittest discover -s tests -p "test_*.py" -v
